<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youooo — Username Checker</title>
  <meta name="description" content="Check if your username is available across Instagram, TikTok, Twitter, YouTube, GitHub, Reddit and 20+ more platforms instantly. Free username checker." />
  <meta property="og:title" content="Youooo — Username Checker" />
  <meta property="og:description" content="Check your username across 20+ platforms in one click. 100% free." />
  <meta property="og:url" content="https://youooo.com" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SE9RWL5WBY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SE9RWL5WBY');
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0f;
      --card:    #13131a;
      --border:  #1e1e2e;
      --accent:  #7c3aed;
      --accent2: #06b6d4;
      --green:   #10b981;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HERO ── */
    .hero {
      width: 100%;
      text-align: center;
      padding: 64px 24px 48px;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, #7c3aed22, transparent);
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #a78bfa, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-top: 10px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    /* ── SEARCH ── */
    .search-wrap {
      width: 100%;
      max-width: 580px;
      margin: 36px auto 0;
      padding: 0 20px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 6px 6px 6px 22px;
      transition: border-color .2s;
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #7c3aed22;
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1.1rem;
      min-width: 0;
    }

    .search-box input::placeholder { color: var(--muted); }

    .search-box button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 40px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .2s, transform .1s;
    }

    .search-box button:hover  { opacity: .88; }
    .search-box button:active { transform: scale(.97); }

    .hint {
      text-align: center;
      margin-top: 12px;
      font-size: .85rem;
      color: var(--muted);
    }

    /* ── RESULTS ── */
    .results {
      width: 100%;
      max-width: 960px;
      padding: 40px 20px 80px;
      display: none;
    }

    .results.visible { display: block; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .results-title {
      font-size: 1.1rem;
      color: var(--muted);
    }

    .results-title span { color: var(--text); font-weight: 700; }

    /* copy button */
    .copy-btn {
      background: linear-gradient(135deg, var(--green), #059669);
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 10px 22px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity .2s, transform .1s;
    }

    .copy-btn:hover  { opacity: .88; }
    .copy-btn:active { transform: scale(.97); }
    .copy-btn.copied { background: linear-gradient(135deg, #64748b, #475569); }

    /* summary bar */
    .summary {
      display: flex;
      gap: 24px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .95rem;
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.green  { background: var(--green);  }
    .dot.red    { background: var(--red);    }
    .dot.yellow { background: var(--yellow); }

    /* filter tabs */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--muted);
      border-radius: 30px;
      padding: 6px 16px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }

    .filter-btn.active,
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .filter-btn.active { background: #7c3aed22; }

    /* grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .2s, transform .15s;
      cursor: default;
      position: relative;
    }

    .card:hover { transform: translateY(-2px); }
    .card.available { border-color: #10b98140; }
    .card.taken     { border-color: #ef444440; cursor: pointer; }
    .card.checking  { border-color: #f59e0b30; cursor: pointer; }
    .card.hidden    { display: none; }

    .platform-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .card-info { flex: 1; min-width: 0; }

    .platform-name {
      font-weight: 700;
      font-size: .95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .platform-url {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-badge {
      font-size: .75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-available { background: #10b98120; color: var(--green); }
    .badge-taken     { background: #ef444420; color: var(--red);   }
    .badge-check     { background: #f59e0b20; color: var(--yellow);}
    .badge-loading   { background: #64748b20; color: var(--muted); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #fff;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: .95rem;
      transition: transform .3s ease;
      z-index: 999;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── FOOTER ── */
    footer {
      margin-top: auto;
      padding: 20px;
      text-align: center;
      font-size: .8rem;
      color: var(--muted);
    }

    footer a { color: var(--accent2); text-decoration: none; }

    @media (max-width: 500px) {
      .logo { font-size: 2rem; }
      .search-box button { padding: 11px 18px; font-size: .9rem; }
      .grid { grid-template-columns: 1fr; }
      .results-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="logo">youooo ✦</div>
  <p class="tagline">Check your username across 25+ platforms instantly</p>

  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="usernameInput" placeholder="Enter username..."
             maxlength="50" autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false" />
      <button id="checkBtn" onclick="checkAll()">Check</button>
    </div>
  </div>
  <p class="hint">No sign-up needed · 100% free · Results in seconds</p>
</div>

<div class="results" id="results">
  <div class="results-header">
    <div class="results-title">Results for <span id="resultUsername"></span></div>
    <button class="copy-btn" id="copyBtn" onclick="copyAvailable()">
      📋 Copy Available Usernames
    </button>
  </div>

  <div class="summary">
    <div class="summary-item"><div class="dot green"></div><span id="countAvailable">0 Available</span></div>
    <div class="summary-item"><div class="dot red"></div><span id="countTaken">0 Taken</span></div>
    <div class="summary-item"><div class="dot yellow"></div><span id="countCheck">0 Check Manually</span></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterCards('all', this)">All</button>
    <button class="filter-btn" onclick="filterCards('available', this)">✓ Available</button>
    <button class="filter-btn" onclick="filterCards('taken', this)">✗ Taken</button>
    <button class="filter-btn" onclick="filterCards('checking', this)">→ Check Manually</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="toast" id="toast"></div>

<footer>
  Made with ♥ · <a href="https://youooo.com">youooo.com</a>
  · Check your username across 25+ social platforms for free
</footer>

<script>
// ── Platforms ─────────────────────────────────────────────────────────────────
const PLATFORMS = [
  // Social
  { name:"Instagram",   icon:"📸", bg:"#fff0f5", url:u=>`https://instagram.com/${u}`,          method:"link" },
  { name:"TikTok",      icon:"🎵", bg:"#f0fffe", url:u=>`https://tiktok.com/@${u}`,            method:"link" },
  { name:"Twitter / X", icon:"✖️", bg:"#f0f8ff", url:u=>`https://x.com/${u}`,                  method:"link" },
  { name:"Facebook",    icon:"👤", bg:"#f0f4ff", url:u=>`https://facebook.com/${u}`,            method:"link" },
  { name:"Snapchat",    icon:"👻", bg:"#fffef0", url:u=>`https://snapchat.com/add/${u}`,        method:"link" },
  { name:"Threads",     icon:"🧵", bg:"#f5f0ff", url:u=>`https://threads.net/@${u}`,            method:"link" },
  { name:"Mastodon",    icon:"🐘", bg:"#f0f0ff", url:u=>`https://mastodon.social/@${u}`,        method:"link" },
  { name:"BeReal",      icon:"📷", bg:"#fff8f0", url:u=>`https://bere.al/${u}`,                 method:"link" },

  // Video
  { name:"YouTube",     icon:"▶️", bg:"#fff5f5", url:u=>`https://youtube.com/@${u}`,            method:"link" },
  { name:"Twitch",      icon:"🎮", bg:"#f8f0ff", url:u=>`https://twitch.tv/${u}`,               method:"link" },
  { name:"Vimeo",       icon:"🎬", bg:"#f0f8ff", url:u=>`https://vimeo.com/${u}`,               method:"link" },
  { name:"Dailymotion", icon:"📹", bg:"#fff5f0", url:u=>`https://dailymotion.com/${u}`,         method:"link" },

  // Dev / Tech
  { name:"GitHub",      icon:"🐙", bg:"#f0f6ff",
    url:u=>`https://github.com/${u}`, method:"api",
    api:u=>`https://api.github.com/users/${u}` },
  { name:"GitLab",      icon:"🦊", bg:"#fff5f0", url:u=>`https://gitlab.com/${u}`,              method:"link" },
  { name:"Dev.to",      icon:"💻", bg:"#f5f5f5",
    url:u=>`https://dev.to/${u}`, method:"api",
    api:u=>`https://dev.to/api/users/by_username?url=${u}` },
  { name:"Hashnode",    icon:"📓", bg:"#f5f0ff", url:u=>`https://hashnode.com/@${u}`,           method:"link" },
  { name:"Stack Overflow",icon:"📚",bg:"#fff8f0",url:u=>`https://stackoverflow.com/users?tab=Reputation&filter=${u}`, method:"link" },
  { name:"Replit",      icon:"⚡", bg:"#f0fff8", url:u=>`https://replit.com/@${u}`,             method:"link" },
  { name:"Codepen",     icon:"🖊️", bg:"#f0f8ff", url:u=>`https://codepen.io/${u}`,              method:"link" },
  { name:"Kaggle",      icon:"📊", bg:"#f0fbff", url:u=>`https://kaggle.com/${u}`,              method:"link" },

  // Community
  { name:"Reddit",      icon:"🤖", bg:"#fff1ec",
    url:u=>`https://reddit.com/user/${u}`, method:"api",
    api:u=>`https://www.reddit.com/user/${u}/about.json` },
  { name:"Discord",     icon:"🎧", bg:"#f3f4ff", url:u=>`https://discord.com`,                  method:"link", note:"Search in Discord app" },
  { name:"Telegram",    icon:"✈️", bg:"#f0f9ff", url:u=>`https://t.me/${u}`,                    method:"link" },
  { name:"Quora",       icon:"❓", bg:"#fff5f5", url:u=>`https://quora.com/profile/${u}`,        method:"link" },

  // Creative
  { name:"Pinterest",   icon:"📌", bg:"#fff5f5", url:u=>`https://pinterest.com/${u}`,           method:"link" },
  { name:"Behance",     icon:"🎨", bg:"#f0f5ff", url:u=>`https://behance.net/${u}`,             method:"link" },
  { name:"Dribbble",    icon:"🏀", bg:"#fff0f8", url:u=>`https://dribbble.com/${u}`,            method:"link" },
  { name:"Flickr",      icon:"📷", bg:"#f0f8ff", url:u=>`https://flickr.com/people/${u}`,       method:"link" },
  { name:"500px",       icon:"🖼️", bg:"#f5f5f5", url:u=>`https://500px.com/p/${u}`,             method:"link" },

  // Music
  { name:"Spotify",     icon:"🎧", bg:"#f0fff5", url:u=>`https://open.spotify.com/user/${u}`,   method:"link" },
  { name:"SoundCloud",  icon:"🔊", bg:"#fff5f0", url:u=>`https://soundcloud.com/${u}`,          method:"link" },
  { name:"Last.fm",     icon:"🎵", bg:"#fff5f5", url:u=>`https://last.fm/user/${u}`,            method:"link" },
  { name:"Bandcamp",    icon:"🎸", bg:"#f5fff0", url:u=>`https://${u}.bandcamp.com`,             method:"link" },

  // Professional
  { name:"LinkedIn",    icon:"💼", bg:"#f0f8ff", url:u=>`https://linkedin.com/in/${u}`,         method:"link" },
  { name:"Medium",      icon:"📝", bg:"#f8f8f8", url:u=>`https://medium.com/@${u}`,             method:"link" },
  { name:"Substack",    icon:"📨", bg:"#fff8f0", url:u=>`https://${u}.substack.com`,             method:"link" },
  { name:"Product Hunt",icon:"🐱", bg:"#fff5f0", url:u=>`https://producthunt.com/@${u}`,        method:"link" },
  { name:"AngelList",   icon:"🚀", bg:"#f5f5f5", url:u=>`https://angel.co/u/${u}`,              method:"link" },

  // Gaming
  { name:"Steam",       icon:"🎮", bg:"#f0f4ff",
    url:u=>`https://steamcommunity.com/id/${u}`, method:"api",
    api:u=>`https://steamcommunity.com/id/${u}/?xml=1` },
  { name:"Xbox",        icon:"🟢", bg:"#f0fff5", url:u=>`https://account.xbox.com/profile?gamertag=${u}`, method:"link" },
  { name:"PSN",         icon:"🎮", bg:"#f0f5ff", url:u=>`https://psnprofiles.com/${u}`,         method:"link" },
  { name:"Roblox",      icon:"🧱", bg:"#fff5f5", url:u=>`https://roblox.com/user.aspx?username=${u}`,    method:"link" },
];

// ── State ─────────────────────────────────────────────────────────────────────
let results = {};   // index → "available" | "taken" | "link"
let currentUsername = "";
let available = 0, taken = 0, manual = 0;

// ── Check all ─────────────────────────────────────────────────────────────────
function checkAll() {
  const input = document.getElementById("usernameInput");
  const username = input.value.trim().replace(/^@/, "");
  if (!username) { input.focus(); return; }

  // GA event
  if (typeof gtag !== "undefined") {
    gtag("event", "search", { event_category: "username", event_label: username });
  }

  currentUsername = username;
  results = {};
  available = 0; taken = 0; manual = 0;

  document.getElementById("resultUsername").textContent = `@${username}`;
  document.getElementById("results").classList.add("visible");
  document.getElementById("grid").innerHTML = "";
  updateCounts();

  // Reset filter to All
  document.querySelectorAll(".filter-btn").forEach((b,i) => b.classList.toggle("active", i===0));

  // Render loading cards
  PLATFORMS.forEach((p, i) => {
    const card = makeCard(i, p, username, "loading");
    document.getElementById("grid").appendChild(card);
  });

  // Check each
  PLATFORMS.forEach((p, i) => {
    if (p.method === "api") {
      checkViaApi(p, i, username).then(result => setResult(i, p, username, result));
    } else {
      setTimeout(() => setResult(i, p, username, "link"), 200 + i * 60);
    }
  });
}

async function checkViaApi(platform, index, username) {
  try {
    const headers = platform.name === "GitHub"
      ? { "Accept": "application/vnd.github.v3+json" } : {};
    const res = await fetch(platform.api(username), { headers });
    if (res.status === 404) return "available";
    if (res.ok)             return "taken";
    return "link";
  } catch { return "link"; }
}

function setResult(i, p, username, result) {
  results[i] = result;
  if (result === "available") available++;
  else if (result === "taken") taken++;
  else manual++;
  updateCounts();

  const old = document.getElementById(`card-${i}`);
  if (!old) return;
  const card = makeCard(i, p, username, result);

  // Keep hidden state if filtered
  const activeFilter = document.querySelector(".filter-btn.active")?.dataset?.filter || "all";
  if (activeFilter !== "all" && card.dataset.status !== activeFilter) {
    card.classList.add("hidden");
  }

  old.replaceWith(card);
}

function makeCard(i, p, username, status) {
  const card = document.createElement("div");
  card.id = `card-${i}`;
  card.dataset.status = status;

  let badgeClass, badgeText, cardClass;
  if (status === "available") {
    badgeClass = "badge-available"; badgeText = "✓ Available"; cardClass = "available";
  } else if (status === "taken") {
    badgeClass = "badge-taken";     badgeText = "✗ Taken";     cardClass = "taken";
  } else if (status === "link") {
    badgeClass = "badge-check";     badgeText = "→ Check";     cardClass = "checking";
  } else {
    badgeClass = "badge-loading";   badgeText = '<span class="spinner"></span>'; cardClass = "";
  }

  card.className = `card ${cardClass}`;

  if (status === "taken" || status === "link") {
    card.style.cursor = "pointer";
    card.onclick = () => {
      window.open(p.url(username), "_blank");
      if (typeof gtag !== "undefined") {
        gtag("event", "click_platform", { event_category: "platform", event_label: p.name });
      }
    };
  }

  card.innerHTML = `
    <div class="platform-icon" style="background:${p.bg}">${p.icon}</div>
    <div class="card-info">
      <div class="platform-name">${p.name}</div>
      <div class="platform-url">${p.note || p.url(username)}</div>
    </div>
    <span class="status-badge ${badgeClass}">${badgeText}</span>
  `;
  return card;
}

// ── Counts ────────────────────────────────────────────────────────────────────
function updateCounts() {
  document.getElementById("countAvailable").textContent = `${available} Available`;
  document.getElementById("countTaken").textContent     = `${taken} Taken`;
  document.getElementById("countCheck").textContent     = `${manual} Check Manually`;
}

// ── Filter ────────────────────────────────────────────────────────────────────
function filterCards(filter, btn) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  btn.dataset.filter = filter;

  document.querySelectorAll(".card").forEach(card => {
    const status = card.dataset.status;
    const show = filter === "all"
      || (filter === "available" && status === "available")
      || (filter === "taken"     && status === "taken")
      || (filter === "checking"  && status === "link");
    card.classList.toggle("hidden", !show);
  });
}

// ── Copy available usernames ──────────────────────────────────────────────────
function copyAvailable() {
  const availablePlatforms = PLATFORMS
    .filter((_, i) => results[i] === "available")
    .map(p => `${p.name}: ${p.url(currentUsername)}`);

  if (availablePlatforms.length === 0) {
    showToast("No available usernames found yet!");
    return;
  }

  const text = `@${currentUsername} is available on:\n\n` + availablePlatforms.join("\n");
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.textContent = "✓ Copied!";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.innerHTML = "📋 Copy Available Usernames";
      btn.classList.remove("copied");
    }, 2500);
    showToast(`Copied ${availablePlatforms.length} available username(s)!`);

    if (typeof gtag !== "undefined") {
      gtag("event", "copy_available", { event_category: "engagement", value: availablePlatforms.length });
    }
  });
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}
